<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duel Arena Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --font-pixel: 'Press Start 2P', monospace;
  --color-bg: #0d0b14;
  --color-surface: #1a1625;
  --color-border: rgba(255,255,255,0.08);
  --color-text: #f0eaf8;
  --color-text-muted: #8a7fa0;
  --color-p1: #e84040;
  --color-p2: #4080e8;
  --color-hp-bg: #2a1a1a;
  --color-hp-fill-p1: #e84040;
  --color-hp-fill-p2: #4080e8;
  --color-gold: #f0c040;
  --color-win: #50d080;
  --color-dmg: #ff6060;
  --px: 4px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: var(--color-bg);
  font-family: var(--font-pixel);
  color: var(--color-text);
  overflow: hidden;
  image-rendering: pixelated;
}

/* ── LAYOUT ── */
#arena {
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
  position: relative;
  background:
    radial-gradient(circle at 12% 8%, rgba(195,255,255,0.18), transparent 16%),
    radial-gradient(circle at 88% 8%, rgba(195,255,255,0.18), transparent 16%),
    linear-gradient(180deg, #4f0808 0%, #2b070b 28%, #100d14 62%, var(--color-bg) 100%);
}

#arena::after {
  content:'';
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(150deg, transparent 0 18%, rgba(255,255,255,0.14) 19% 26%, transparent 27% 100%),
    linear-gradient(210deg, transparent 0 18%, rgba(255,255,255,0.14) 19% 26%, transparent 27% 100%),
    linear-gradient(170deg, transparent 0 34%, rgba(255,255,255,0.10) 35% 40%, transparent 41% 100%),
    linear-gradient(190deg, transparent 0 34%, rgba(255,255,255,0.10) 35% 40%, transparent 41% 100%);
  z-index: 0;
}

/* scanline overlay */
#arena::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
  z-index: 100;
}

/* ── HUD ── */
#hud {
  width: 100%; max-width: 900px;
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: 8px;
  padding: 16px 24px 8px;
}
.hud-fighter { display: flex; flex-direction: column; gap: 6px; }
.hud-fighter.p2 { align-items: flex-end; }
.fighter-name {
  font-size: 9px; letter-spacing: 1px;
  text-transform: uppercase; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; max-width: 200px;
}
.fighter-name.p1 { color: var(--color-p1); }
.fighter-name.p2 { color: var(--color-p2); }
.hp-track {
  width: 100%; max-width: 260px; height: 14px;
  background: var(--color-hp-bg);
  border: 2px solid rgba(255,255,255,0.12);
  position: relative; overflow: hidden;
}
.hud-fighter.p2 .hp-track { margin-left: auto; }
.hp-fill {
  height: 100%; width: 100%;
  transition: width 0.4s steps(20, end);
  position: relative;
}
.hp-fill.p1 { background: var(--color-hp-fill-p1); }
.hp-fill.p2 { background: var(--color-hp-fill-p2); }
.hp-fill::after {
  content:''; position:absolute; top:0; left:0; right:0; height:4px;
  background: rgba(255,255,255,0.25);
}
.hp-text { font-size: 7px; color: var(--color-text-muted); }

.hud-center { text-align: center; }
.round-label { font-size: 7px; color: var(--color-text-muted); margin-bottom: 4px; }
.round-num { font-size: 14px; color: var(--color-gold); }
.wager-label { font-size: 6px; color: var(--color-text-muted); margin-top: 4px; }
.wager-val { font-size: 8px; color: var(--color-gold); }

/* ── FIGHT STAGE ── */
#stage {
  width: 100%; max-width: 900px;
  height: 340px;
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 0 40px;
  position: relative;
}

/* ground */
#stage::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:3px;
  background: repeating-linear-gradient(90deg, rgba(255,255,255,0.06) 0 8px, transparent 8px 16px);
}

/* ── BOXER IMAGES ── */
.boxer-wrap {
  display: flex; flex-direction: column;
  align-items: center; position: relative;
  width: 170px;
}
.boxer {
  width: 180px;
  height: 195px;
  object-fit: contain;
  image-rendering: pixelated;
  display: block;
}

/* Punch arm extension — hidden by default, shown during attack */
.boxer-wrap .punch-ext {
  position:absolute; top: calc(5 * var(--px)); right: calc(-10 * var(--px));
  display: grid;
  grid-template-columns: repeat(10, var(--px));
  grid-template-rows: repeat(4, var(--px));
  opacity: 0;
  transition: opacity 0.05s;
}
.boxer-wrap.punching .punch-ext { opacity: 1; }
.boxer-wrap.punching .boxer { transform: translateX(8px); }
.boxer-wrap.blocking .boxer { transform: translateX(-6px) rotate(-5deg); }

/* idle bob animation */
@keyframes idle-bob {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-3px); }
}
@keyframes idle-bob-flip {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-3px); }
}
.boxer-wrap.p1 { animation: idle-bob 1.2s ease-in-out infinite; }
.boxer-wrap.p2 { animation: idle-bob-flip 1.2s ease-in-out infinite 0.3s; }
.boxer-wrap.punching, .boxer-wrap.blocking { animation: none !important; }

@keyframes punch-anim {
  0%   { transform: translateX(0); }
  30%  { transform: translateX(18px); }
  60%  { transform: translateX(18px); }
  100% { transform: translateX(0); }
}
@keyframes block-anim {
  0%   { transform: translateX(0) rotate(0); }
  50%  { transform: translateX(-8px) rotate(-8deg); }
  100% { transform: translateX(0) rotate(0); }
}
.boxer-wrap.punching .boxer { animation: punch-anim 0.5s ease-in-out forwards; }
.boxer-wrap.blocking .boxer { animation: block-anim 0.5s ease-in-out forwards; }

/* hit flash */
@keyframes hit-flash {
  0%,100% { filter: none; }
  30%     { filter: brightness(3) saturate(0); }
  60%     { filter: brightness(1.5) hue-rotate(0deg); }
}
.boxer-wrap.taking-hit .boxer { animation: hit-flash 0.4s ease-out forwards; }

/* ── EVENT LOG ── */
#event-log {
  width: 100%; max-width: 900px;
  min-height: 56px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; padding: 0 24px;
}
.event-line {
  font-size: 8px; text-align: center; letter-spacing: 0.5px;
  opacity: 0; transform: translateY(4px);
  transition: opacity 0.3s, transform 0.3s;
  max-width: 600px;
}
.event-line.visible { opacity: 1; transform: translateY(0); }
.event-line.ev-hit  { color: var(--color-dmg); }
.event-line.ev-block{ color: #80c0ff; }
.event-line.ev-info { color: var(--color-text-muted); }
.event-line.ev-win  { color: var(--color-win); font-size: 10px; }

/* ── MOVE STATUS ROW ── */
#move-row {
  width: 100%; max-width: 1080px;
  display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px; padding: 8px 24px 8px;
  align-items: stretch;
}
.move-panel {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  padding: 10px 14px;
  min-height: 74px;
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  align-items: center;
  column-gap: 10px;
  row-gap: 6px;
  overflow: hidden;
}
.move-panel.p2 {
  grid-template-columns: minmax(0, 1fr) auto;
}
.move-panel-label {
  font-size: 6px; color: var(--color-text-muted); text-transform: uppercase;
  white-space: nowrap;
}
.move-badge {
  font-size: 8px; padding: 6px 10px;
  border: 1px solid rgba(255,255,255,0.15);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 132px;
  max-width: 100%;
  min-height: 30px;
  text-align: center;
  background: rgba(255,255,255,0.04);
  white-space: normal;
  word-break: break-word;
  line-height: 1.4;
}
.move-badge.waiting { color: var(--color-text-muted); border-color: rgba(255,255,255,0.06); }
.move-badge.locked  { color: var(--color-gold); border-color: var(--color-gold); }
.move-badge.revealed-jab   { color: #80ff80; }
.move-badge.revealed-cross { color: var(--color-dmg); }
.move-badge.revealed-hook  { color: #ffb030; }
.move-badge.revealed-block { color: #80c0ff; }

@media (max-width: 780px) {
  #move-row {
    grid-template-columns: 1fr;
    gap: 6px;
    padding: 6px 10px 4px;
  }

  .move-panel,
  .move-panel.p2 {
    grid-template-columns: 1fr;
    justify-items: stretch;
    padding: 8px 10px;
    min-height: 58px;
    row-gap: 4px;
  }

  .move-panel-label,
  .move-panel.p2 .move-panel-label {
    font-size: 5px;
    white-space: nowrap;
    text-align: left;
    justify-self: start;
  }

  .move-badge,
  .move-panel.p2 .move-badge {
    min-width: 0;
    width: 100%;
    max-width: 100%;
    min-height: 24px;
    padding: 4px 6px;
    font-size: 6px;
    line-height: 1.2;
    white-space: normal;
    word-break: break-word;
    overflow-wrap: anywhere;
    text-align: center;
    justify-self: stretch;
  }
}

/* ── RESULT SCREEN ── */
#result-screen {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; z-index: 50;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s;
}
#result-screen.visible { opacity: 1; pointer-events: all; }

@keyframes winner-pulse {
  0%,100% { text-shadow: 0 0 8px currentColor, 0 0 24px currentColor; }
  50%      { text-shadow: 0 0 4px currentColor; }
}
.result-winner {
  font-size: 11px; color: var(--color-win); text-transform: uppercase;
  animation: winner-pulse 1.2s ease-in-out infinite;
}
.result-name { font-size: 18px; color: var(--color-gold); margin-top: 4px; }
.result-sub  { font-size: 7px; color: var(--color-text-muted); margin-top: 8px; }
.result-pot  { font-size: 9px; color: var(--color-gold); }

/* dismiss countdown */
.result-dismiss { font-size: 6px; color: var(--color-text-muted); margin-top: 12px; }

/* ── IDLE SCREEN ── */
#idle-screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; z-index: 40;
  transition: opacity 0.5s;
}
#idle-screen.hidden { opacity: 0; pointer-events: none; }
.idle-title { font-size: 18px; color: var(--color-gold); text-transform: uppercase; letter-spacing: 2px; }
.idle-title.break-active { animation: blink 1s step-end infinite; }
.idle-break-timer {
  font-size: 12px;
  color: var(--color-gold);
  min-height: 18px;
  text-shadow: 0 0 10px rgba(240,192,64,0.35);
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.idle-sub { font-size: 8px; color: var(--color-text-muted); animation: blink 1.4s step-end infinite; }
.idle-hint { font-size: 6px; color: rgba(255,255,255,0.2); margin-top: 8px; }

/* ── PLAYER CONTROLS ── */
#player-controls {
  position: fixed; left: 50%; bottom: 10px; transform: translateX(-50%);
  width: min(1320px, calc(100vw - 20px));
  display: grid; grid-template-columns: 1fr auto 1fr;
  gap: 10px; z-index: 200;
  align-items: stretch;
}
.control-panel {
  background: rgba(0,0,0,0.86);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 14px 16px;
  min-height: 108px;
  display: flex; flex-direction: column; gap: 10px;
  justify-content: center;
}
.control-title {
  font-size: 7px; color: var(--color-gold); text-transform: uppercase;
}
.control-sub {
  font-size: 6px; color: var(--color-text-muted);
}
.control-buttons {
  display: flex; flex-wrap: wrap; gap: 10px;
}
.control-center {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  background: rgba(0,0,0,0.86);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 14px 18px;
  min-height: 108px;
}
#player-controls button {
  font-family: var(--font-pixel); font-size: 7px;
  min-width: 86px;
  padding: 8px 12px; cursor: pointer;
  background: var(--color-surface); color: var(--color-text);
  border: 1px solid rgba(255,255,255,0.2);
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
#player-controls button:hover { background: rgba(255,255,255,0.12); }
#player-controls button:disabled { opacity: 0.3; cursor: default; }
#player-controls button.selected {
  color: var(--color-text);
  border-color: rgba(255,255,255,0.2);
  background: var(--color-surface);
}
#demo-label { font-family: var(--font-pixel); font-size: 6px; color: var(--color-text-muted); align-self: center; }

@media (max-width: 600px) {
  html, body { height: 100%; overflow: hidden; }

  #arena {
    height: 100dvh;
    min-height: 100dvh;
    justify-content: flex-start;
    padding-top: 0;
  }

  #hud {
    padding: 6px 8px 2px;
    max-width: 100%;
    gap: 4px;
  }

  .fighter-name { font-size: 7px; max-width: 110px; }
  .hp-track { height: 10px; max-width: 120px; }
  .hp-text { font-size: 6px; }
  .round-label { font-size: 6px; }
  .round-num { font-size: 10px; }
  .wager-label { font-size: 5px; margin-top: 2px; }
  .wager-val { font-size: 7px; }

  #stage {
    height: 170px;
    max-width: 100%;
    padding: 0 18px 10px;
  }

  .boxer { width: 96px; height: 104px; }
  .boxer-wrap { width: 88px; }

  #idle-screen {
    position: absolute;
    left: 0;
    right: 0;
    top: 160px;
    bottom: auto;
    justify-content: center;
    gap: 4px;
    z-index: 40;
  }
  .idle-title { font-size: 11px; }
  .idle-sub { font-size: 6px; }
  .idle-break-timer { font-size: 10px; }

  #move-row {
    width: 100%;
    max-width: 100%;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    padding: 2px 4px 4px;
    margin-top: -2px;
  }

  .move-panel,
  .move-panel.p2 {
    grid-template-columns: 1fr;
    justify-items: stretch;
    padding: 5px 6px;
    min-height: 42px;
    row-gap: 2px;
  }

  .move-panel-label,
  .move-panel.p2 .move-panel-label {
    font-size: 5px;
    text-align: left;
    justify-self: start;
  }

  .move-badge,
  .move-panel.p2 .move-badge {
    min-width: 0;
    width: 100%;
    max-width: 100%;
    min-height: 18px;
    padding: 2px 4px;
    font-size: 5px;
    line-height: 1.1;
    white-space: normal;
    word-break: break-word;
    text-align: center;
    justify-self: stretch;
  }

  #player-controls {
    position: fixed;
    left: 0;
    right: 0;
    bottom: auto;
    top: 336px;
    transform: none;
    width: 100%;
    max-width: 100%;
    padding: 4px 4px calc(env(safe-area-inset-bottom, 0px) + 4px);
    gap: 4px;
    grid-template-columns: 1fr 54px 1fr;
    align-items: stretch;
    background: linear-gradient(180deg, rgba(10,8,16,0), rgba(10,8,16,0.88) 14%, rgba(10,8,16,0.97) 100%);
  }

  .control-panel {
    padding: 4px;
    min-height: 164px;
    gap: 4px;
  }

  .control-title { font-size: 6px; }
  .control-sub { font-size: 4px; }

  .control-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px;
  }

  #player-controls button {
    font-size: 9px;
    min-width: 0;
    width: 100%;
    min-height: 56px;
    padding: 6px 2px;
    line-height: 1.05;
  }

  .control-center {
    padding: 4px 3px;
    min-height: 164px;
    gap: 4px;
  }

  #demo-label { font-size: 4px; }
}



@media (max-width: 600px) {
  #result-screen {
    justify-content: flex-start;
    padding-top: 170px;
    gap: 10px;
  }

  .result-winner { font-size: 10px; }
  .result-name { font-size: 14px; }
  .result-sub { font-size: 6px; margin-top: 4px; }
  .result-pot { font-size: 8px; }
  .result-dismiss { font-size: 5px; margin-top: 8px; }
}

</style>
</head>
<body>

<div id="arena">

  <!-- IDLE SCREEN -->
  <div id="idle-screen">
    <div class="idle-title" id="idle-title-text">⚔ DUEL ARENA ⚔</div>
    <div class="idle-break-timer" id="idle-break-timer"></div>
    <div class="idle-sub" id="idle-sub-text">type !box @username in chat</div>
    <div class="idle-hint"></div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-fighter p1">
      <div class="fighter-name p1" id="p1-name">PLAYER 1</div>
      <div class="hp-track"><div class="hp-fill p1" id="p1-hp-fill"></div></div>
      <div class="hp-text"><span id="p1-hp-val">100</span> HP</div>
    </div>
    <div class="hud-center">
      <div class="round-label">ROUND</div>
      <div class="round-num" id="round-num">—</div>
      <div class="round-num" id="round-countdown"></div>
      <div class="wager-label">WAGER</div>
      <div class="wager-val" id="wager-val">—</div>
    </div>
    <div class="hud-fighter p2">
      <div class="fighter-name p2" id="p2-name">PLAYER 2</div>
      <div class="hp-track"><div class="hp-fill p2" id="p2-hp-fill"></div></div>
      <div class="hp-text"><span id="p2-hp-val">100</span> HP</div>
    </div>
  </div>

  <!-- STAGE -->
  <div id="stage">

      <button id="btn-p2-cross" disabled>Cross (30 DMG)</button>

<script>
// ── SUPABASE CONFIG ── Replace these two values with your real credentials
const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';

function sbFetch(path, opts) {
  opts = opts || {};
  return fetch(SUPABASE_URL + path, Object.assign({}, opts, {
    headers: Object.assign({
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
    }, opts.headers || {}),
  }));
}

var _urlParams = new URLSearchParams(window.location.search);
var SESSION_ID = _urlParams.get('sessionId') || null;

const MOVES = {
  jab:   { label: 'JAB',   dmg: 15, desc: 'Quick straight' },
  cross: { label: 'CROSS', dmg: 30, desc: 'Power straight' },
  hook:  { label: 'HOOK',  dmg: 22, desc: 'Wide swing' },
  block: { label: 'BLOCK', dmg: 0,  desc: 'Reduce dmg 60%' },
};
const BLOCK_REDUCTION    = 0.4;
const REGULATION_ROUNDS  = 4;
const ROUND_REVEAL_DELAY = 5000;

var state = {
  active: false, round: 0,
  p1: { name: 'PLAYER1', hp: 100, lastMove: null, lastLastMove: null },
  p2: { name: 'PLAYER2', hp: 100, lastMove: null, lastLastMove: null },
  p1Move: null, p2Move: null, wager: 500, waitingFor: null,
};

var $ = function(id) { return document.getElementById(id); };
var idleScreen     = $('idle-screen');
var resultScreen   = $('result-screen');
var idleTitleText  = $('idle-title-text');
var idleBreakTimer = $('idle-break-timer');
var idleSubText    = $('idle-sub-text');
var p1HpFill = $('p1-hp-fill'); var p2HpFill = $('p2-hp-fill');
var p1HpVal  = $('p1-hp-val');  var p2HpVal  = $('p2-hp-val');
var p1NameEl = $('p1-name');    var p2NameEl = $('p2-name');
var roundNumEl = $('round-num'); var wagerValEl = $('wager-val');
var ev1 = $('ev1'); var ev2 = $('ev2');
var p1Badge = $('p1-move-badge'); var p2Badge = $('p2-move-badge');
var boxerP1 = $('boxer-p1');    var boxerP2 = $('boxer-p2');

var roundCountdownId = null;
var breakOverlayId   = null;
var supabasePoller   = null;

function pollSession() {
  if (!SESSION_ID) return;
  sbFetch('/rest/v1/the_boob_games?session_id=eq.' + encodeURIComponent(SESSION_ID) + '&select=*&limit=1')
  .then(function(res) { if (!res.ok) return; return res.json(); })
  .then(function(rows) {
    if (!rows || !rows.length) return;
    var row = rows[0];
    if (row.status === 'in_progress' && !state.active) {
      stopPolling();
      var p1name = row.challenger_name || row.p1_name || 'PLAYER 1';
      var p2name = row.target_name     || row.p2_name || 'PLAYER 2';
      var wager  = row.wager           || row.amount  || 500;
      DuelArena.startDuel(p1name, p2name, wager);
    }
  }).catch(function(e) { console.warn('[Arena] Poll error:', e); });
}

function startPolling() {
  if (supabasePoller || !SESSION_ID) return;
  pollSession();
  supabasePoller = setInterval(pollSession, 2000);
}

function stopPolling() {
  if (supabasePoller) { clearInterval(supabasePoller); supabasePoller = null; }
}

function markSessionComplete(winnerName) {
  if (!SESSION_ID) return;
  sbFetch('/rest/v1/the_boob_games?session_id=eq.' + encodeURIComponent(SESSION_ID), {
    method: 'PATCH',
    headers: { 'Prefer': 'return=minimal' },
    body: JSON.stringify({ status: 'complete', winner_name: winnerName }),
  }).then(function() {
    console.log('[Arena] Session complete. Winner:', winnerName);
  }).catch(function(e) { console.error('[Arena] Patch failed:', e); });
}

function showBreakOverlay(seconds) {
  if (breakOverlayId) { clearInterval(breakOverlayId); breakOverlayId = null; }
  idleScreen.classList.remove('hidden');
  if (idleTitleText)  idleTitleText.classList.add('break-active');
  if (idleSubText)    idleSubText.textContent = 'next round starts in';
  if (idleBreakTimer) idleBreakTimer.textContent = String(seconds);
  var remaining = seconds;
  breakOverlayId = setInterval(function() {
    remaining--;
    if (remaining <= 0) {
      if (idleBreakTimer) idleBreakTimer.textContent = '';
      if (idleTitleText)  idleTitleText.classList.remove('break-active');
      if (idleSubText)    idleSubText.textContent = 'type !box @username in chat';
      idleScreen.classList.add('hidden');
      clearInterval(breakOverlayId); breakOverlayId = null;
    } else {
      if (idleBreakTimer) idleBreakTimer.textContent = String(remaining);
    }
  }, 1000);
}

function hideBreakOverlay() {
  if (breakOverlayId) { clearInterval(breakOverlayId); breakOverlayId = null; }
  if (idleBreakTimer) idleBreakTimer.textContent = '';
  if (idleTitleText)  idleTitleText.classList.remove('break-active');
  if (idleSubText)    idleSubText.textContent = 'type !box @username in chat';
  idleScreen.classList.add('hidden');
}

function setRoundCountdown(seconds) {
  var el = document.getElementById('round-timer');
  if (!el) return;
  if (roundCountdownId) { clearInterval(roundCountdownId); roundCountdownId = null; }
  if (seconds <= 0) { el.textContent = ''; return; }
  el.textContent = 'Next round in ' + seconds + 's';
  roundCountdownId = setInterval(function() {
    seconds--;
    if (seconds <= 0) {
      clearInterval(roundCountdownId); roundCountdownId = null; el.textContent = '';
    } else { el.textContent = 'Next round in ' + seconds + 's'; }
  }, 1000);
}

function updateHP() {
  var p1pct = Math.max(0, state.p1.hp); var p2pct = Math.max(0, state.p2.hp);
  p1HpFill.style.width = p1pct + '%'; p2HpFill.style.width = p2pct + '%';
  p1HpVal.textContent = p1pct; p2HpVal.textContent = p2pct;
}

function showEvent(line1, cls1, line2, cls2) {
  ev1.textContent = line1 || ''; ev1.className = 'event-line ' + (cls1||'ev-info') + ' visible';
  ev2.textContent = line2 || ''; ev2.className = 'event-line ' + (cls2||'ev-info') + (line2 ? ' visible' : '');
}

function setBadge(el, move, st) {
  if (st === 'waiting')  { el.textContent = 'WAITING'; el.className = 'move-badge waiting'; }
  else if (st === 'locked')   { el.textContent = 'LOCKED';  el.className = 'move-badge locked'; }
  else if (st === 'revealed') { el.textContent = MOVES[move].label; el.className = 'move-badge revealed-' + move; }
}

function animateBoxer(wrap, type, cb) {
  wrap.classList.remove('punching','blocking','taking-hit');
  void wrap.offsetWidth;
  wrap.classList.add(type);
  setTimeout(function() { wrap.classList.remove(type); if (cb) cb(); }, 600);
}

function updateDemoButtons() {
  var active = state.active;
  $('btn-start').disabled = active;
  var canP1 = active && (!state.p1Move || !state.p2Move);
  var canP2 = active && (!state.p2Move || !state.p1Move);
  ['jab','cross','hook','block'].forEach(function(m) {
    $('btn-p1-'+m).disabled = !canP1;
    $('btn-p2-'+m).disabled = !canP2;
  });
}

window.DuelArena = {
  startDuel: function(p1name, p2name, wager) {
    state.active = true; state.round = 0;
    state.p1 = { name: p1name.toUpperCase(), hp: 100, lastMove: null, lastLastMove: null };
    state.p2 = { name: p2name.toUpperCase(), hp: 100, lastMove: null, lastLastMove: null };
    state.p1Move = null; state.p2Move = null; state.wager = wager || 500;
    p1NameEl.textContent = state.p1.name; p2NameEl.textContent = state.p2.name;
    wagerValEl.textContent = state.wager + ' dabloobs'; roundNumEl.textContent = '—';
    updateHP(); hideBreakOverlay(); resultScreen.classList.remove('visible');
    setBadge(p1Badge, null, 'waiting'); setBadge(p2Badge, null, 'waiting');
    showEvent('⚔ DUEL ACCEPTED', 'ev-info', state.p1.name + ' vs ' + state.p2.name, 'ev-info');
    setTimeout(function() { DuelArena.nextRound(); }, 1800);
  },

  nextRound: function() {
    setRoundCountdown(0); state.round++; state.p1Move = null; state.p2Move = null; state.waitingFor = 'both';
    roundNumEl.textContent = state.round <= REGULATION_ROUNDS ? (state.round+' / '+REGULATION_ROUNDS) : ('OT '+(state.round-REGULATION_ROUNDS));
    setBadge(p1Badge, null, 'waiting'); setBadge(p2Badge, null, 'waiting');
    ['jab','cross','hook','block'].forEach(function(m) { $('btn-p1-'+m).classList.remove('selected'); $('btn-p2-'+m).classList.remove('selected'); });
    var lbl = state.round <= REGULATION_ROUNDS ? ('ROUND '+state.round) : ('OVERTIME '+(state.round-REGULATION_ROUNDS));
    showEvent(lbl+' — PICK YOUR MOVE','ev-info','Both fighters choosing...','ev-info');
    updateDemoButtons();
  },

  submitMove: function(player, move) {
    if (!state.active || !MOVES[move]) return;
    var p = state['p'+player];
    if (p.lastMove === move && p.lastLastMove === move) {
      showEvent('⚠ '+p.name+' cant use '+move+' again!','ev-hit','',''); return;
    }
    if (player === 1) {
      state.p1Move = move; setBadge(p1Badge, move, 'locked');
      ['jab','cross','hook','block'].forEach(function(m) { $('btn-p1-'+m).classList.toggle('selected', m===move); });
    } else {
      state.p2Move = move; setBadge(p2Badge, move, 'locked');
      ['jab','cross','hook','block'].forEach(function(m) { $('btn-p2-'+m).classList.toggle('selected', m===move); });
    }
    if (state.p1Move && state.p2Move) setTimeout(function() { DuelArena.resolveRound(); }, 800);
    updateDemoButtons();
  },

  resolveRound: function() {
    var m1 = state.p1Move, m2 = state.p2Move;
    setBadge(p1Badge, m1, 'revealed'); setBadge(p2Badge, m2, 'revealed');
    var dmg1to2 = MOVES[m1].dmg, dmg2to1 = MOVES[m2].dmg;
    if (m2 === 'block') dmg1to2 = Math.round(dmg1to2 * BLOCK_REDUCTION);
    if (m1 === 'block') dmg2to1 = Math.round(dmg2to1 * BLOCK_REDUCTION);
    state.p2.hp = Math.max(0, state.p2.hp - dmg1to2);
    state.p1.hp = Math.max(0, state.p1.hp - dmg2to1);
    state.p1.lastLastMove = state.p1.lastMove; state.p1.lastMove = m1;
    state.p2.lastLastMove = state.p2.lastMove; state.p2.lastMove = m2;
    animateBoxer(boxerP1, m1==='block'?'blocking':'punching');
    animateBoxer(boxerP2, m2==='block'?'blocking':'punching');
    if (dmg1to2 > 0) setTimeout(function() { animateBoxer(boxerP2,'taking-hit'); }, 200);
    if (dmg2to1 > 0) setTimeout(function() { animateBoxer(boxerP1,'taking-hit'); }, 200);
    var line1 = state.p1.name+' used '+MOVES[m1].label;
    var line2 = state.p2.name+' used '+MOVES[m2].label;
    if (m2==='block' && dmg1to2<MOVES[m1].dmg) line1+=' → blocked! ('+dmg1to2+' dmg)'; else if (dmg1to2>0) line1+=' → '+dmg1to2+' dmg';
    if (m1==='block' && dmg2to1<MOVES[m2].dmg) line2+=' → blocked! ('+dmg2to1+' dmg)'; else if (dmg2to1>0) line2+=' → '+dmg2to1+' dmg';
    showEvent(line1, m1==='block'?'ev-block':'ev-hit', line2, m2==='block'?'ev-block':'ev-hit');
    setTimeout(function() {
      updateHP();
      var ko   = state.p1.hp<=0 || state.p2.hp<=0;
      var done = state.round>=REGULATION_ROUNDS && state.p1.hp!==state.p2.hp;
      if (ko||done) { setRoundCountdown(0); hideBreakOverlay(); setTimeout(function(){DuelArena.showResult();},1000); }
      else          { setRoundCountdown(5); showBreakOverlay(5); setTimeout(function(){DuelArena.nextRound();},ROUND_REVEAL_DELAY); }
    }, 300);
  },

  showResult: function() {
    state.active = false; updateDemoButtons();
    var winnerName, loserName;
    if (state.p1.hp >= state.p2.hp) { winnerName = state.p1.name; loserName = state.p2.name; }
    else                             { winnerName = state.p2.name; loserName = state.p1.name; }
    // ── PATCH SUPABASE: status=complete + winner_name ──
    // Streamer.bot watches for this to pay dabloobs and post chat result
    markSessionComplete(winnerName);
    $('result-winner-text').textContent = '🏆 WINNER';
    $('result-name-text').textContent   = winnerName;
    $('result-pot-text').textContent    = '+ '+(state.wager*2)+' dabloobs';
    $('result-sub-text').textContent    = loserName+' has been defeated';
    resultScreen.classList.add('visible');
    var secs = 7;
    $('result-dismiss-text').textContent = 'closing in '+secs+'s';
    var iv = setInterval(function() {
      secs--; $('result-dismiss-text').textContent = 'closing in '+secs+'s';
      if (secs<=0) { clearInterval(iv); DuelArena.reset(); }
    }, 1000);
  },

  reset: function() {
    state.active = false; stopPolling();
    resultScreen.classList.remove('visible'); idleScreen.classList.remove('hidden');
    roundNumEl.textContent = '—'; wagerValEl.textContent = '—';
    p1NameEl.textContent = 'PLAYER 1'; p2NameEl.textContent = 'PLAYER 2';
    state.p1.hp = 100; state.p2.hp = 100; updateHP(); setRoundCountdown(0);
    showEvent('','','','');
    setBadge(p1Badge,null,'waiting'); setBadge(p2Badge,null,'waiting');
    ['jab','cross','hook','block'].forEach(function(m) { $('btn-p1-'+m).classList.remove('selected'); $('btn-p2-'+m).classList.remove('selected'); });
    updateDemoButtons();
  },
};

$('btn-start').addEventListener('click', function() { DuelArena.startDuel('Red Boxer','Blue Boxer',500); });
['jab','cross','hook','block'].forEach(function(m) {
  $('btn-p1-'+m).addEventListener('click', function() { DuelArena.submitMove(1,m); });
  $('btn-p2-'+m).addEventListener('click', function() { DuelArena.submitMove(2,m); });
});

updateDemoButtons();

if (SESSION_ID) {
  console.log('[Arena] sessionId found:', SESSION_ID, '— polling Supabase...');
  startPolling();
}
</script>
</body>
